[build]
  publish = "."
  command = "echo done"

# Serve static files directly (before SPA fallback)
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

# Domain redirect: jnbservice.com → jnbllc.com
[[redirects]]
  from = "https://jnbservice.com/*"
  to = "https://jnbllc.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.jnbservice.com/*"
  to = "https://jnbllc.com/:splat"
  status = 301
  force = true

# Strip .html extensions
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# SPA fallback — LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
