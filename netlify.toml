[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Force all non-primary domains to 301 redirect to jnbllc.com
[[redirects]]
  from = "/*"
  to = "https://jnbllc.com/:splat"
  status = 301
  force = true
  [redirects.conditions]
    Host = ["jnbservice.com", "www.jnbservice.com", "www.jnbllc.com"]

# SPA fallback — all routes serve index.html on the primary domain
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
