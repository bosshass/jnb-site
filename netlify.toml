[build]
  publish = "."
  command = "echo done"

# ──────────────────────────────────────────────
# Domain redirect: jnbservice.com → jnbllc.com
# (requires jnbservice.com added as domain alias in Netlify dashboard)
# ──────────────────────────────────────────────

[[redirects]]
  from = "https://jnbservice.com/*"
  to = "https://jnbllc.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.jnbservice.com/*"
  to = "https://jnbllc.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.jnbllc.com/*"
  to = "https://jnbllc.com/:splat"
  status = 301
  force = true

# ──────────────────────────────────────────────
# Strip .html extensions (301 permanent redirect)
# Netlify splats only work at the end of paths,
# so we list each page explicitly.
# ──────────────────────────────────────────────

[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/services.html"
  to = "/services"
  status = 301
  force = true

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/blog.html"
  to = "/blog"
  status = 301
  force = true

# ──────────────────────────────────────────────
# SPA fallback — serve index.html for all routes
# ──────────────────────────────────────────────

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
